name: Security Alert Summary

# Dependabot alerts on private repos require a GitHub App or PAT (not GITHUB_TOKEN).
# This workflow posts an informational PR comment with open critical/high alert counts by type.
# It does not fail the check or block merges.
# Managed via github-infra. See RFC: Dependabot and CodeQL - Security Alert Summary.

on:
  pull_request:
    branches:
      - master
      - main
      - develop

concurrency:
  group: security-alert-summary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-alert-summary:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    name: Report open critical/high Dependabot and CodeQL alerts
    permissions:
      contents: read

    env:
      SAST_GH_APP_ID: ${{ secrets.SAST_GH_APP_ID }}
      SAST_GH_APP_PRIVATE_KEY: ${{ secrets.SAST_GH_APP_PRIVATE_KEY }}
      COMMENT_MARKER: "<!-- security-alert-summary -->"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ env.SAST_GH_APP_ID }}
          private-key: ${{ env.SAST_GH_APP_PRIVATE_KEY }}
          permission-vulnerability-alerts: read
          permission-security-events: read
          permission-pull-requests: write

      - name: Summarize alerts and update PR comment
        id: summarize
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const run = require(`${process.env.GITHUB_WORKSPACE}/.github/workflows/security-alert-summary.js`);
            await run({ github, context, core });
